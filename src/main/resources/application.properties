openai.api-key=${OPENAI_API_KEY}
openai.model=gpt-5.5
openai.timeout-seconds=10

aws.region=ap-south-1


dynamodb.table.templates=templates-v11
dynamodb.table.entities=sender-entities-v11
dynamodb.table.normalization=normalization-rules
dynamodb.table.extracted-messages=extracted-messages-v11

kafka.bootstrap-servers=localhost:9092
kafka.topic=sms-inbound
kafka.group-id=sms-extraction-engine

template.confidence-threshold=0.50

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Virtual threads
spring.threads.virtual.enabled=true

# LLM concurrency
llm.max-concurrent-calls=100

# Redis learning lock TTL
redis.learning.ttl-seconds=120
